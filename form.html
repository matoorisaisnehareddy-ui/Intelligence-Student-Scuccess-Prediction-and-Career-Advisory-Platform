<!DOCTYPE html>
<html>
<head>
  <title>Student Form</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 🔴 TOP RIGHT LOGOUT -->
<div class="top-bar">
  <a href="/logout">
    <button type="button">Logout</button>
  </a>
</div>

<div class="container">
  <h2>📋 Student Input Form</h2>

  <form action="/predict" method="POST">
    <input name="gpa" placeholder="GPA" required>
    <input name="attendance" placeholder="Attendance (%)" required>
    <input name="study" placeholder="Study Hours" required>
    <input name="programming" placeholder="Programming (1-5)" required>
    <input name="communication" placeholder="Communication (1-5)" required>
    <input name="analytics" placeholder="Analytics (1-5)" required>

    <button type="submit">Predict</button>
  </form>

  <br>


</div>

</body>
</html>
