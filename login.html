<!DOCTYPE html>
<html>
<head>
<title>Student Success Platform</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(to right,#1a4076,#ba19aa);
}

.login-container{
display:flex;
width:850px;
height:450px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* LEFT SIDE */

.left-panel{
flex:1;
background: linear-gradient(135deg,#0072ff,#00c6ff);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

.left-panel h1{
font-size:28px;
margin-bottom:10px;
}

.left-panel p{
font-size:15px;
opacity:0.9;
}

/* RIGHT SIDE */

.right-panel{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:50px;
}

.right-panel h2{
margin-bottom:20px;
color:#333;
}

.input-box{
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
font-size:14px;
}

.input-box input:focus{
border-color:#0072ff;
}

.login-btn{
width:100%;
padding:12px;
background:#0072ff;
border:none;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#0057cc;
}

.footer{
margin-top:20px;
font-size:12px;
color:#777;
text-align:center;
}

</style>
</head>

<body>

<div class="login-container">

<!-- Left Side -->

<div class="left-panel">
<h1>🎓 Student Success AI</h1>
<p>
Predict student performance and get intelligent career recommendations using AI.
</p>
</div>

<!-- Right Side -->

<div class="right-panel">

<h2>Login</h2>

<!-- 🔥 IMPORTANT CHANGE: action="/home" -->

<form action="/home" method="post">

<div class="input-box">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required>
</div>

<button class="login-btn">✨ Enter Platform</button>

</form>

<div class="footer">
Mini Project | Intelligent Student Success Prediction Platform
</div>

</div>

</div>

</body>
</html>
